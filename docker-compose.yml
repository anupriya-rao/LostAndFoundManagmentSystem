version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: lost-and-found-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: lost_and_found
      MYSQL_USER: lfuser
      MYSQL_PASSWORD: lfpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d
    networks:
      - lost-and-found-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Java Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lost-and-found-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/lost_and_found
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - lost-and-found-network
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped

  # Frontend (Optional - if running frontend from Docker)
  frontend:
    image: nginx:alpine
    container_name: lost-and-found-frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - lost-and-found-network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local

networks:
  lost-and-found-network:
    driver: bridge
